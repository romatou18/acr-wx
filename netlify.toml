[build]
  command = "bash scripts/build.sh"
  publish   = "public"
  functions = "functions"

  # The Garmin page test fixtures are captured third-party HTML and carry Garmin's
  # own Google Maps / Cloudflare tokens (not ours). Exclude them from secret scanning
  # so a fresh real capture doesn't fail the build. Our own secrets live only in env
  # vars and are still scanned everywhere else.
  [build.environment]
    SECRETS_SCAN_OMIT_PATHS = "cmd/bot/testdata/*.html"

[functions."weather-bot"]
  schedule = "* * * * *"

[functions."weather-api"]
  # Invoked via the redirects below — users hit /weather-api, not /.netlify/functions/weather-api

# Proxy /weather-api/* and /weather-api to the Lambda function.
# status=200 means Netlify rewrites internally (no client redirect).
[[redirects]]
  from = "/weather-api/all"
  to   = "/.netlify/functions/weather-api/all"
  status = 200

[[redirects]]
  from = "/weather-api"
  to   = "/.netlify/functions/weather-api"
  status = 200

[[redirects]]
  from = "/log"
  to   = "/.netlify/functions/weather-api/log"
  status = 200

# force = true so /debug always routes to the function. Without it Netlify's
# pretty-URL matching serves the static public/debug.html for /debug and skips
# this rewrite. The viewer page itself lives at the distinct path /debug.html.
[[redirects]]
  from = "/debug"
  to   = "/.netlify/functions/weather-api/debug"
  status = 200
  force = true

# Suspend/resume the weather-bot's inbound processing. force = true so these
# always reach the function (no static file to shadow them, but kept consistent).
[[redirects]]
  from = "/pause"
  to   = "/.netlify/functions/weather-api/pause"
  status = 200
  force = true

[[redirects]]
  from = "/resume"
  to   = "/.netlify/functions/weather-api/resume"
  status = 200
  force = true

# Upload a saved Garmin message page to validate the bot's parser still works.
[[redirects]]
  from = "/garmin-parse-test"
  to   = "/.netlify/functions/weather-api/garmin-parse-test"
  status = 200
  force = true
