[build]
  command = "bash scripts/init.sh && bash scripts/build.sh"
  publish   = "public"
  functions = "functions"

[functions."weather-bot"]
  schedule = "* * * * *"

[functions."weather-api"]
  # Invoked via the redirects below — users hit /weather-api, not /.netlify/functions/weather-api

# Proxy /weather-api/* and /weather-api to the Lambda function.
# status=200 means Netlify rewrites internally (no client redirect).
[[redirects]]
  from = "/weather-api/all"
  to   = "/.netlify/functions/weather-api/all"
  status = 200

[[redirects]]
  from = "/weather-api"
  to   = "/.netlify/functions/weather-api"
  status = 200

[[redirects]]
  from = "/log"
  to   = "/.netlify/functions/weather-api/log"
  status = 200
